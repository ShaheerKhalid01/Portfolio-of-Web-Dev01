<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaheer Khalid - Full Stack Web Developer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Custom Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #000000;
      color: #ffffff;
      overflow-x: hidden;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1f2937;
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #a855f7, #06b6d4);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #9333ea, #0891b2);
    }
    
    /* Custom animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: .7;
      }
    }
    
    @keyframes gradient-shift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }
    
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-shift 3s ease infinite;
    }
    
    /* Smooth focus states */
    input:focus, textarea:focus {
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.3);
    }
    
    /* Enhanced hover effects */
    .project-card {
      transition: all 0.3s ease;
    }
    
    .project-card:hover {
      transform: translateY(-5px) scale(1.02);
    }
    
    /* Gradient text animation */
    .gradient-text {
      background: linear-gradient(-45deg, #a855f7, #ec4899, #06b6d4, #10b981);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s ease infinite;
    }
    
    /* Floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    
    .float {
      animation: float 3s ease-in-out infinite;
    }
    
    /* Glowing border effect */
    .glow-border {
      position: relative;
      overflow: hidden;
    }
    
    .glow-border::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #a855f7, #ec4899, #06b6d4, #10b981);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .glow-border:hover::before {
      opacity: 0.7;
    }
    
    /* Custom button hover effects */
    .btn-primary {
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .btn-primary:hover::after {
      left: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Portfolio = () => {
      const [activeSection, setActiveSection] = useState('home');
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => {
        setIsLoaded(true);
        
        // Intersection Observer for active section tracking
        const sections = document.querySelectorAll('section[id]');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              setActiveSection(entry.target.id);
            }
          });
        }, {
          threshold: 0.3,
          rootMargin: '-100px 0px -100px 0px'
        });

        sections.forEach((section) => {
          observer.observe(section);
        });

        return () => {
          sections.forEach((section) => {
            observer.unobserve(section);
          });
        };
      }, []);

      const scrollToSection = (sectionId) => {
        const element = document.getElementById(sectionId);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const projects = [
        {
          title: "Glasses Store Clone with VR",
          description: "An immersive eyewear e-commerce platform featuring virtual reality try-on experiences. Built with React, WebGL, and advanced AR libraries for realistic face tracking and 3D modeling.",
          tech: ["React.js", "A-Frame", "MindAR", "WebGL", "Tailwind CSS"],
          features: ["Virtual Try-On", "Face Tracking", "3D Modeling", "Performance Optimized"],
          icon: "🥽",
          github: "https://github.com/ShaheerKhalid01/Glasses-Website-Clone/tree/master",
          demo: "https://virtual-glasses-ecommerce-store.netlify.app/"
        },
        {
          title: "Netflix Clone",
          description: "Full-featured streaming platform interface with dynamic content browsing, favorites list management, and movie collections. Built with modern React patterns and responsive design.",
          tech: ["React.js", "JavaScript", "Tailwind CSS", "Context API"],
          features: ["Favorites List", "Search & Filter", "Movie Collections", "Responsive Design"],
          icon: "🎬",
          github: "https://github.com/ShaheerKhalid01/netflix_clone/tree/main",
          demo: "https://netflixclone-two-flax.vercel.app/"
        },
        {
          title: "Spotify Clone",
          description: "Music streaming interface with advanced audio controls, playlist creation and management, and modern UI design showcasing front-end mastery and Web Audio API integration.",
          tech: ["React.js", "Web Audio API", "Tailwind CSS", "Context API"],
          features: ["Audio Playback", "Playlist Creation", "Search", "Modern UI"],
          icon: "🎵",
          github: "https://github.com/ShaheerKhalid01/Spotify-Clone/tree/main",
          demo: "https://spotify-clone-nu.vercel.app/"
        }
      ];

      const skills = [
        { name: "React.js", level: 90, icon: "⚛️", color: "from-blue-500 to-cyan-500" },
        { name: "MongoDB", level: 85, icon: "🍃", color: "from-green-500 to-emerald-500" },
        { name: "Tailwind CSS", level: 95, icon: "🎨", color: "from-teal-500 to-blue-500" },
        { name: "JavaScript", level: 88, icon: "⚡", color: "from-yellow-500 to-orange-500" },
        { name: "Node.js", level: 82, icon: "🚀", color: "from-green-600 to-green-500" },
        { name: "Express.js", level: 80, icon: "🔧", color: "from-gray-500 to-gray-400" }
      ];

      const services = [
        {
          icon: "🌐",
          title: "Full Stack Development",
          description: "Complete web applications using React, MongoDB, and modern technologies with scalable architecture.",
          color: "from-purple-900/20 to-gray-900/50",
          borderColor: "border-purple-500/20 hover:border-purple-500/40"
        },
        {
          icon: "📱",
          title: "Responsive Design",
          description: "Mobile-first, cross-platform websites that work perfectly on all devices and screen sizes.",
          color: "from-cyan-900/20 to-gray-900/50",
          borderColor: "border-cyan-500/20 hover:border-cyan-500/40"
        },
        {
          icon: "🚀",
          title: "Performance Optimization",
          description: "High-performance websites with optimized bundle sizes, fast loading times, and SEO optimization.",
          color: "from-pink-900/20 to-gray-900/50",
          borderColor: "border-pink-500/20 hover:border-pink-500/40"
        }
      ];

      return (
        <div className="min-h-screen bg-black text-white overflow-x-hidden">
          {/* Background Effects */}
          <div className="fixed inset-0 pointer-events-none z-0">
            <div className="absolute inset-0 bg-gradient-to-br from-purple-900/5 via-transparent to-cyan-900/5"></div>
            <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_30%_20%,rgba(168,85,247,0.1),transparent_50%)]"></div>
            <div className="absolute bottom-0 right-0 w-full h-full bg-[radial-gradient(circle_at_70%_80%,rgba(6,182,212,0.1),transparent_50%)]"></div>
          </div>

          {/* Navigation */}
          <nav className="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-xl border-b border-purple-500/20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                <div className="text-2xl font-bold gradient-text">
                  SK

                <div className="hidden md:flex space-x-8">
                  {['home', 'about', 'skills', 'portfolio', 'services', 'contact'].map((section) => (
                    <button
                      key={section}
                      onClick={() => scrollToSection(section)}

                        activeSection === section ? 'text-purple-400' : 'text-gray-400'

                    >
                      {section}
                      {activeSection === section && (
                        <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-purple-500 to-cyan-500"></div>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <section id="home" className="min-h-screen flex items-center justify-center relative pt-24">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="text-center">
                <div className={`transition-all duration-1000 ${isLoaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                  <div className="w-48 h-48 mx-auto mb-8 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 p-1 float relative z-20 mt-8">
                    <div className="w-full h-full rounded-full bg-gray-900 flex items-center justify-center border border-gray-700 overflow-hidden">
                      <img 
                        src="image.jpg" 
                        alt="Shaheer Khalid - Full Stack Developer" 
                        className="w-full h-full object-cover rounded-full"
                        onError={(e) => {
                          e.target.style.display = 'none';
                          e.target.nextElementSibling.style.display = 'block';
                        }}
                      />
                      <div className="text-6xl" style={{display: 'none'}}>👨‍💻</div>
                    </div>
                  </div>
                  
                  <h1 className="text-6xl md:text-8xl font-bold mb-6 gradient-text leading-tight">
                    SHAHEER KHALID
                  </h1>
                  
                  <h2 className="text-2xl md:text-4xl mb-6 text-gray-300 font-light tracking-wide">
                    Full Stack Web Developer
                  </h2>
                  
                  <p className="text-xl md:text-2xl mb-12 text-gray-400 max-w-3xl mx-auto leading-relaxed">
                    Building Any Website with React, MongoDB, and Tailwind CSS
                  </p>
                  
                  <button 
                    onClick={() => scrollToSection('portfolio')}
                    className="group relative px-8 py-4 bg-gradient-to-r from-purple-600 to-cyan-600 rounded-full text-white font-semibold text-lg transition-all duration-300 hover:scale-105 hover:shadow-2xl hover:shadow-purple-500/25 btn-primary animate-gradient"
                  >
                    <span className="relative z-10">View My Projects</span>
                  </button>
                </div>
              </div>
            </div>
          </section>

          {/* About Section */}
          <section id="about" className="py-20 bg-gradient-to-b from-black to-gray-900/50 relative">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <h2 className="text-5xl md:text-6xl font-bold text-center mb-16 gradient-text">
                About Me
              </h2>
              
              <div className="grid md:grid-cols-2 gap-12 items-center">
                <div>
                  <p className="text-lg text-gray-300 mb-6 leading-relaxed">
                    I am a passionate Full Stack Web Developer with expertise in the MERN stack ecosystem. 
                    As a motivated beginner seeking my first professional role, I specialize in creating 
                    modern, responsive websites with cutting-edge technologies.
                  </p>
                  <p className="text-lg text-gray-300 mb-8 leading-relaxed">
                    My journey in web development is driven by a love for clean code, innovative solutions, 
                    and creating exceptional user experiences that make a difference.
                  </p>
                </div>
                
                <div className="space-y-6">
                  <div className="bg-gray-800/30 p-6 rounded-2xl border border-purple-500/20 glow-border">
                    <h3 className="text-xl font-semibold text-purple-400 mb-4">Education Timeline</h3>
                    <div className="space-y-6">
                      <div className="border-l-4 border-purple-500 pl-6 relative">
                        <div className="absolute w-3 h-3 bg-purple-500 rounded-full -left-2 top-1"></div>
                        <h4 className="font-semibold text-white">Bachelors in Data Science</h4>
                        <p className="text-gray-400">COMSATS University Islamabad</p>
                        <p className="text-sm text-cyan-400 font-medium">Expected: 2028</p>
                      </div>
                      <div className="border-l-4 border-cyan-500 pl-6 relative">
                        <div className="absolute w-3 h-3 bg-cyan-500 rounded-full -left-2 top-1"></div>
                        <h4 className="font-semibold text-white">ICS Pure</h4>
                        <p className="text-gray-400">Alpine College of Sciences</p>
                        <p className="text-sm text-purple-400 font-medium">Graduated: 2022</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Skills Section */}
          <section id="skills" className="py-20 bg-black relative">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <h2 className="text-5xl md:text-6xl font-bold text-center mb-16 gradient-text">
                Skills & Expertise
              </h2>
              
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                {skills.map((skill, index) => (
                  <div 
                    key={skill.name} 
                    className="bg-gray-800/30 p-6 rounded-2xl border border-gray-600/30 hover:border-purple-500/40 transition-all duration-500 hover:scale-105 hover:shadow-xl hover:shadow-purple-500/20 project-card"
                    style={{ animationDelay: `${index * 100}ms` }}
                  >
                    <div className="flex items-center mb-4">
                      <span className="text-3xl mr-3">{skill.icon}</span>
                      <h3 className="text-xl font-semibold text-white">{skill.name}</h3>
                    </div>
                    <div className="w-full bg-gray-700/50 rounded-full h-3 mb-2">
                      <div 
                        className={`bg-gradient-to-r ${skill.color} h-3 rounded-full transition-all duration-1000 relative overflow-hidden`}
                        style={{ width: `${skill.level}%` }}
                      >
                        <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                      </div>
                    </div>
                    <p className="text-right text-sm text-gray-400 font-medium">{skill.level}%</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Portfolio Section */}
          <section id="portfolio" className="py-20 bg-gradient-to-b from-black to-gray-900/50 relative">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <h2 className="text-5xl md:text-6xl font-bold text-center mb-16 gradient-text">
                Featured Projects
              </h2>
              
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                {projects.map((project, index) => (
                  <div 
                    key={project.title}
                    className="group bg-gray-800/20 rounded-2xl overflow-hidden border border-gray-700/30 hover:border-purple-500/50 transition-all duration-500 project-card glow-border"
                  >
                    <div className="h-48 bg-gradient-to-br from-purple-900/30 to-cyan-900/30 relative overflow-hidden">
                      <div className="absolute inset-0 bg-black/30"></div>
                      <div className="absolute inset-0 flex items-center justify-center">
                        <div className="text-6xl opacity-60 group-hover:opacity-100 group-hover:scale-110 transition-all duration-300">
                          {project.icon}
                        </div>
                      </div>
                      <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                      </div>
                    </div>
                    
                    <div className="p-6">
                      <h3 className="text-xl font-semibold mb-3 text-white group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-purple-400 group-hover:to-cyan-400 transition-all duration-300">
                        {project.title}
                      </h3>
                      <p className="text-gray-400 mb-4 text-sm leading-relaxed">
                        {project.description}
                      </p>
                      
                      <div className="flex flex-wrap gap-2 mb-4">
                        {project.tech.map((tech) => (
                          <span 
                            key={tech} 
                            className="px-3 py-1 bg-purple-500/20 text-purple-300 text-xs rounded-full border border-purple-500/30 hover:bg-purple-500/30 transition-colors duration-200"
                          >
                            {tech}
                          </span>
                        ))}
                      </div>
                      
                      <div className="flex flex-wrap gap-2 mb-6">
                        {project.features.map((feature) => (
                          <span 
                            key={feature} 
                            className="px-3 py-1 bg-cyan-500/20 text-cyan-300 text-xs rounded-full border border-cyan-500/30 hover:bg-cyan-500/30 transition-colors duration-200"
                          >
                            {feature}
                          </span>
                        ))}
                      </div>
                      
                      <div className="flex space-x-3">
                        <a 
                          href={project.demo} 
                          className="flex-1 bg-gradient-to-r from-purple-600 to-purple-700 px-4 py-2 rounded-xl text-center text-sm font-medium hover:from-purple-700 hover:to-purple-800 transition-all duration-300 hover:scale-105 btn-primary"

                          Live Demo
                        </a>
                        <a 
                          href={project.github} 
                          className="flex-1 bg-gray-700/50 px-4 py-2 rounded-xl text-center text-sm font-medium hover:bg-gray-600/50 transition-all duration-300 border border-gray-600/30"
                        >
                          GitHub
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Services Section */}
          <section id="services" className="py-20 bg-black relative">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <h2 className="text-5xl md:text-6xl font-bold text-center mb-16 gradient-text">
                Services
              </h2>
              
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                {services.map((service, index) => (
                  <div 
                    key={service.title}
                    className={`bg-gradient-to-br ${service.color} p-8 rounded-2xl border ${service.borderColor} transition-all duration-500 hover:scale-105 project-card`}
                  >
                    <div className="text-4xl mb-4">{service.icon}</div>
                    <h3 className="text-xl font-semibold mb-4 text-white">{service.title}</h3>
                    <p className="text-gray-400 leading-relaxed">{service.description}</p>
                  </div>
                ))}

              <div className="text-center bg-gray-800/20 p-8 rounded-2xl border border-gray-600/30">
                <h3 className="text-3xl font-bold mb-4 gradient-text">Comprehensive Website Development</h3>

                  and attention to performance and user experience. From simple landing pages 
                  to complex full-stack applications.

          {/* Contact Section */}

                      <div>
                        <p className="text-gray-400 text-sm mb-1">Phone</p>
                        <a 
                          href="tel:03006737222" 
                          className="text-white hover:text-cyan-400 transition-colors duration-300 font-medium"

    ReactDOM.render(<Portfolio />, document.getElementById('root'));

</body>
</html>
